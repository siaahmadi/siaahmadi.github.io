    Publications:
      - title: Distinct roles of dentate gyrus and medial entorhinal cortex inputs for phase precession and temporal correlations in the hippocampal CA3 area
        authors:
          - Siavash Ahmadi
          - Takuya Sasaki
          - Marta Sabariego
          - Christian Leibold
          - Stefan Leutgeb
          - Jill K. Leutgeb
        publisher: Nature Communications
        releaseDate: 2025-01-02
        url: https://doi.org/10.1038/s41467-024-54943-2
        summary: The hippocampal CA3 subregion is a densely connected recurrent circuit that supports memory by generating and storing sequential neuronal activity patterns that reflect recent experience. While theta phase precession is thought to be critical for generating sequential activity during memory encoding, the circuit mechanisms that support this computation across hippocampal subregions are unknown. By analyzing CA3 network activity in the absence of each of its theta-modulated external excitatory inputs, we show necessary and unique contributions of the dentate gyrus (DG) and the medial entorhinal cortex (MEC) to phase precession. DG inputs are essential for preferential spiking of CA3 cells during late theta phases and for organizing the temporal order of neuronal firing, while MEC inputs sharpen the temporal precision throughout the theta cycle. A computational model that accounts for empirical findings suggests that the unique contribution of DG inputs to theta-related spike timing is supported by targeting precisely timed inhibitory oscillations. Our results thus identify a novel and unique functional role of the DG for sequence coding in the CA3 circuit.

      - title: Dentate network activity is necessary for spatial working memory by supporting CA3 sharp-wave ripple generation and prospective firing of CA3 neurons
        authors:
          - Takuya Sasaki
          - Verónica C Piatti
          - Ernie Hwaun
          - Siavash Ahmadi
          - John E Lisman
          - Stefan Leutgeb
          - Jill K Leutgeb
        publisher: Nature Neuroscience
        releaseDate: 2018-01-15
        url: https://doi.org/10.1038/s41593-017-0061-5
        summary: Complex spatial working memory tasks have been shown to require both hippocampal sharp-wave ripple (SWR) activity and dentate gyrus (DG) neuronal activity. We therefore asked whether DG inputs to CA3 contribute to spatial working memory by promoting SWR generation. Recordings from DG and CA3 while rats performed a dentate-dependent working memory task on an eight-arm radial maze revealed that the activity of dentate neurons and the incidence rate of SWRs both increased during reward consumption. We then found reduced reward-related CA3 SWR generation without direct input from dentate granule neurons. Furthermore, CA3 cells with place fields in not-yet-visited arms preferentially fired during SWRs at reward locations, and these prospective CA3 firing patterns were more pronounced for correct trials and were dentate-dependent. These results indicate that coordination of CA3 neuronal activity patterns by DG is necessary for the generation of neuronal firing patterns that support goal-directed behavior and memory.

      - title: Time cells in the Hippocampus are neither dependent on medial Entorhinal cortex inputs nor necessary for spatial working memory
        authors:
          - Marta Sabariego
          - Antonia Schönwald
          - Brittney L. Boublil
          - David T. Zimmerman
          - Siavash Ahmadi
          - Nailea Gonzalez
          - Christian Leibold
          - Robert E. Clark
          - Jill K. Leutgeb
          - Stefan Leutgeb
        publisher: Neuron
        releaseDate: 2019-05-02
        url: https://doi.org/10.1016/j.neuron.2019.04.005
        summary: A key function of the hippocampus and entorhinal cortex is to bridge events that are discontinuous in time, and it has been proposed that medial entorhinal cortex (mEC) supports memory retention by sustaining the sequential activity of hippocampal time cells. Therefore, we recorded hippocampal neuronal activity during spatial working memory and asked whether time cells depend on mEC inputs. Working memory was impaired in rats with mEC lesions, but the occurrence of time cells and of trajectory-coding cells in the stem did not differ from controls. Rather, the main effect of mEC lesions was an extensive spatial coding deficit of CA1 cells, which included inconsistency over time and reduced firing differences between positions on the maze. Therefore, mEC is critical for providing stable and distinct spatial information to hippocampus, while working memory (WM) maintenance is likely supported either by local synaptic plasticity in hippocampus or by activity patterns elsewhere in the brain.

      - title: Distributed Counterfactual Reward Signaling for Policy Refinement in Multi-Agent Settings
        authors:
          - Siavash Ahmadi
          - Keren Haroush
        publisher: Preprint
        releaseDate: 2025-05-10
        summary: In dynamic social interactions where rewards depend not only on an agent's own actions but also on those of the others, animals must rapidly adjust their actions to satisfy potentially conflicting preferences. Mental simulation of counterfactual outcomes---rewards that would have resulted from actions not taken---can support more efficient policy updating by allowing agents to learn from hypothetical experiences. While such mechanisms have been explored in artificial reinforcement learning systems, their biological basis in social settings remains poorly understood. Here, we adapt a game-theoretic paradigm---the iterated Battle of the Sexes (iBOS)---for neurophysiology to study how macaques make decisions under structured preference conflict. We report that the ventrolateral prefrontal cortex (vlPFC) encodes agent-specific counterfactual rewards and exchanges these signals bidirectionally with the dorsal anterior cingulate cortex (dACC) with an asymmetric temporal organization across task epochs. By dissociating decision variables from the simultaneously represented memory traces, we then show that this information flow in the vlPFC-dACC circuit can partially explain shifts in the representation of behavioral strategies. These findings uncover a distributed, temporally structured neural architecture for counterfactual reward processing in social decision-making, with implications for models of adaptive behavior in multi-agent environments.

      - title: Strong Scaling of Autoregressive Inference
        authors:
          - Siavash Ahmadi
        publisher: Preprint
        releaseDate: 2026-03-10
        summary: The impressive capabilities of modern large language models critically rely on generating responses autoregressively. Autoregressive token generation properly factorizes the joint probability distribution of the output which enables superior response quality. However, following the correct statistical distribution of tokens as such destines generation to be inherently sequential, bottlenecking scaling. Efforts to overcome this have largely fallen short because they fail to preserve the output's joint distribution. Here, we factorize autoregressive generation into a latent graphical model to enable strong inference scaling. Our scheme leads to a theoretical quadratic speedup. We present preliminary empirical results that this amounts to up to over 20x faster wall clock generation time for typical-length outputs on an entry level T4 GPU at the expense of more complexity and compute required at training. Our method's significant gains could empower better reasoning models wherein a large number of chain-of-thought tokens must be generated fast. Furthermore, because of its strong scaling nature and that it preserves the autoregressive property, it can be combined with established methods designed to expedite AR generation to accelerate inference even more.


